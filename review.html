<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réel Média · Visionnage</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #08080F; --bg2: #0F0F1A; --bg3: #16161F; --bg4: #1E1E2A;
    --border: #1E1E2A; --border2: #2A2A3A;
    --text: #F0F0F5; --text2: #9898B0; --text3: #5A5A70;
    --red: #E63946; --red-dim: rgba(230,57,70,0.12);
    --green: #1D9E75; --green-dim: rgba(29,158,117,0.12);
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'SF Mono', 'Fira Code', monospace;
    --r: 6px; --rl: 10px;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 52px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-logo { display: flex; align-items: center; gap: 10px; }
  .header-tag { font-size: 11px; color: var(--text3); font-family: var(--mono); }

  /* LAYOUT */
  .layout { display: flex; height: calc(100vh - 52px); }
  .player-side { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .retours-side {
    width: 340px; flex-shrink: 0;
    background: var(--bg2); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* PLAYER */
  .player-wrap { flex: 1; background: #000; position: relative; }
  .player-iframe { width: 100%; height: 100%; border: none; }
  .player-placeholder {
    display: flex; align-items: center; justify-content: center;
    height: 100%; font-size: 14px; color: var(--text3);
    flex-direction: column; gap: 12px;
  }

  /* INFO VIDÉO */
  .video-info {
    padding: 14px 20px; border-top: 1px solid var(--border);
    background: var(--bg2); display: flex; align-items: center; gap: 12px;
  }
  .video-code { font-family: var(--mono); font-size: 12px; color: var(--red); }
  .video-titre { font-size: 13px; font-weight: 500; flex: 1; }
  .video-version { font-size: 11px; color: var(--text3); background: var(--bg4); padding: 2px 8px; border-radius: 4px; font-family: var(--mono); }

  /* RETOURS PANEL */
  .panel-header {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-count { font-size: 11px; color: var(--text3); font-family: var(--mono); background: var(--bg4); padding: 2px 8px; border-radius: 8px; }
  .retours-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .retour-item {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    cursor: default;
  }
  .retour-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .retour-tc { font-family: var(--mono); font-size: 11px; color: var(--red); background: var(--red-dim); padding: 1px 6px; border-radius: 4px; }
  .retour-cat { font-size: 11px; color: var(--text3); background: var(--bg4); padding: 1px 6px; border-radius: 4px; }
  .retour-desc-text { font-size: 12px; color: var(--text2); line-height: 1.4; }
  .retour-meta { font-size: 10px; color: var(--text3); margin-top: 4px; font-family: var(--mono); }
  .empty-retours { padding: 32px 16px; text-align: center; color: var(--text3); font-size: 13px; }

  /* FORMULAIRE */
  .form-section {
    border-top: 1px solid var(--border); padding: 14px 16px;
    background: var(--bg3); flex-shrink: 0;
  }
  .form-title { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 10px; }
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .form-input {
    background: var(--bg4); border: 1px solid var(--border2);
    color: var(--text); padding: 7px 10px; border-radius: var(--r);
    font-size: 12px; font-family: var(--font); width: 100%;
    transition: border-color 0.15s;
  }
  .form-input:focus { outline: none; border-color: var(--red); }
  .form-input::placeholder { color: var(--text3); }
  select.form-input { cursor: pointer; }
  .btn-submit {
    background: var(--red); border: none; color: #fff;
    padding: 8px 16px; border-radius: var(--r); font-size: 12px;
    font-family: var(--font); cursor: pointer; font-weight: 500;
    width: 100%; transition: opacity 0.15s;
  }
  .btn-submit:hover { opacity: 0.85; }

  /* ÉCRAN IDENTIFICATION */
  .id-screen {
    position: fixed; inset: 0; background: var(--bg); z-index: 999;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .id-card {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: var(--rl); padding: 32px; width: 100%; max-width: 380px;
  }
  .id-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .id-sub { font-size: 13px; color: var(--text3); margin-bottom: 24px; }
  .id-field { margin-bottom: 12px; }
  .id-label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .id-error { font-size: 12px; color: var(--red); margin-top: 8px; display: none; }
  .btn-id {
    background: var(--red); border: none; color: #fff;
    padding: 10px; border-radius: var(--r); font-size: 13px;
    font-family: var(--font); cursor: pointer; font-weight: 500;
    width: 100%; margin-top: 4px;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 20px; right: 20px; padding: 10px 16px;
    background: var(--bg4); border: 1px solid var(--border2);
    border-radius: var(--r); font-size: 12px; color: var(--text);
    opacity: 0; transition: opacity 0.3s; z-index: 9999; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  @media(max-width: 700px) {
    .layout { flex-direction: column; }
    .retours-side { width: 100%; height: 45vh; border-left: none; border-top: 1px solid var(--border); }
    .player-side { height: 55vh; }
  }
</style>
</head>
<body>

  <div class="header-logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 388.61 232.57" style="height:28px;width:auto">

    </svg>
    <span class="header-tag">visionnage</span>
  </div>
  <div id="user-badge" style="display:none;font-size:12px;color:var(--text3)"></div>
</div>

<!-- LAYOUT -->
<div class="layout" id="app-layout" style="display:none">

  <!-- PLAYER -->
  <div class="player-side">
    <div class="player-wrap" id="player-wrap">
      <div class="player-placeholder">
        <span style="font-size:32px">🎬</span>
        <span>Chargement...</span>
      </div>
    </div>
    <div class="video-info" id="video-info" style="display:none">
      <span class="video-code" id="vi-code"></span>
      <span class="video-titre" id="vi-titre"></span>
      <span class="video-version" id="vi-version"></span>
    </div>
  </div>

  <!-- RETOURS -->
  <div class="retours-side">
    <div class="panel-header">
      <span>💬 Mes retours</span>
      <span class="panel-count" id="retours-count">0</span>
    </div>
    <div class="retours-list" id="retours-list">
      <div class="empty-retours">Aucun retour pour le moment</div>
    </div>
    <div class="form-section">
      <div class="form-title">Laisser un retour</div>
      <div class="form-row">
        <input type="text" class="form-input" id="r-tc" placeholder="Timecode ex: 1:24" style="width:110px;font-family:var(--mono)" onblur="formatTc(this)">
        <select class="form-input" id="r-cat">
          <option value="">— Catégorie —</option>
          <option value="🔊 Audio">🔊 Audio</option>
          <option value="🖼 Image">🖼 Image</option>
          <option value="🎬 Rush">🎬 Rush</option>
          <option value="🎨 Graphisme">🎨 Graphisme</option>
          <option value="📺 Accroche">📺 Accroche</option>
          <option value="💬 Sous-titres">💬 Sous-titres</option>
        </select>
      </div>
      <textarea class="form-input" id="r-desc" placeholder="Décrivez votre retour..." style="min-height:70px;resize:vertical;margin-bottom:8px"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();soumettre()}"></textarea>
      <button class="btn-submit" onclick="soumettre()">Envoyer le retour →</button>
    </div>
  </div>
</div>

<!-- ÉCRAN IDENTIFICATION -->
<div class="id-screen" id="id-screen">
  <div class="id-card">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 388.61 232.57" style="height:36px;width:auto;margin-bottom:16px">
      <path fill="#ff451a" d="M219.74,182.03c-1.77-16.84-16.86-29.06-33.7-27.29l-158.58,16.67c-16.84,1.77-29.06,16.86-27.29,33.7H.17c1.77,16.84,16.86,29.06,33.7,27.29l158.58-16.67c16.84-1.77,29.06-16.86,27.29-33.7h0Z"/>
      <g fill="#fff">

        <path d="M283.17,175.74v-90.01l-.52-.52-24.78,2.49-.96-.06v-.06c-6.74-.39-7.51-.91-7.51-5.96V.39l-.52-.39-25.78,2.72v3.63l4.4.78c1.68.39,2.72,1.55,2.72,6.35v68.27c0,5.05-.78,5.57-7.51,5.96v3.76h34.2s.69,0,1.62.02c1.53.04,3.06.19,4.57.46.8.14,1.59.28,1.59.28,1.81.26,2.85,1.55,2.85,6.35v26.92c-2.59-1.04-6.35-1.43-10.23-1.43-8.55,0-16.45,2.46-22.02,7.64-5.83,5.31-9.33,13.86-9.33,24.87,0,19.43,8.68,30.31,23.45,30.31,4.27,0,11.53-2.59,18.14-7.77v6.22h26.94v-3.76c-6.87-.39-7.9-.91-7.9-5.83Z"/>

      <div class="id-label">Prénom *</div>
      <input type="text" class="form-input" id="id-prenom" placeholder="Votre prénom" onkeydown="if(event.key==='Enter')identifier()">
    </div>
    <div class="id-field">
      <div class="id-label">Entreprise <span style="color:var(--text3);font-weight:400">(optionnel)</span></div>
      <input type="text" class="form-input" id="id-entreprise" placeholder="Votre entreprise" onkeydown="if(event.key==='Enter')identifier()">
    </div>

    <button class="btn-id" onclick="identifier()">Accéder à la vidéo →</button>
  </div>

<div class="toast" id="toast"></div>

<script>
const DB_PROD = '01a8dc7d-1cc2-4209-9afe-a3bd90a87e20';
const DB_RETOURS = '02880609-ee82-4acc-b239-d8aac9cae439';
const DB_NOTIFS = '4398775b-c11f-4d73-99c4-9fc31c33ce8b';

let clientNom = '';
let sujetId = '';
let version = '';
let videoUrl = '';
let sujetData = null;

// Proxy Netlify
async function api(endpoint, method='GET', body=null) {
  const res = await fetch(`/.netlify/functions/notion?path=${encodeURIComponent(endpoint)}`, {
    method, headers:{'Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : null
  });
  if(!res.ok) throw new Error(`Erreur API ${res.status}`);
  return res.json();
}

// Récupérer les params URL
function getParams() {
  const p = new URLSearchParams(window.location.search);
  sujetId = p.get('id') || '';
  version = p.get('v') || 'V1';
  videoUrl = decodeURIComponent(p.get('url') || '');
}

// Convertir lien Drive en embed
function toEmbedUrl(url) {
  if(!url) return null;
  if(url.includes('drive.google.com')) {
    const m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    if(m) return `https://drive.google.com/file/d/${m[1]}/preview`;
  }
  if(url.includes('frame.io')) return url;
  if(url.includes('vimeo.com')) {
    const m = url.match(/vimeo\.com\/(\d+)/);
    if(m) return `https://player.vimeo.com/video/${m[1]}`;
  }
  return url;
}

// Identification
function identifier() {
  const prenom = document.getElementById('id-prenom').value.trim();
  const entreprise = document.getElementById('id-entreprise').value.trim();
  if(!prenom) {
    document.getElementById('id-error').style.display = 'block';
    return;
  }
  clientNom = prenom + (entreprise ? ` (${entreprise})` : '');
  sessionStorage.setItem('review-nom', clientNom);
  document.getElementById('id-screen').style.display = 'none';
  document.getElementById('app-layout').style.display = 'flex';
  document.getElementById('user-badge').style.display = 'block';
  document.getElementById('user-badge').textContent = `Connecté en tant que ${clientNom}`;
  initPlayer();
  chargerRetours();
}

// Init player
async function initPlayer() {
  // Charger les infos du sujet
  try {
    const page = await api('/pages/' + sujetId);
    const pr = page.properties;
    const titre = pr.Titre?.title?.[0]?.plain_text || pr.Name?.title?.[0]?.plain_text || '—';
    const code = pr.Code?.rich_text?.[0]?.plain_text || '—';
    sujetData = {titre, code};
    document.getElementById('vi-code').textContent = code;
    document.getElementById('vi-titre').textContent = titre;
    document.getElementById('vi-version').textContent = version;
    document.getElementById('video-info').style.display = 'flex';
    document.title = `${code} · ${titre} · Réel Média`;
  } catch(e) { console.warn('Infos sujet:', e); }

  // Player
  const embedUrl = toEmbedUrl(videoUrl);
  const wrap = document.getElementById('player-wrap');
  if(embedUrl) {
    wrap.innerHTML = `<iframe class="player-iframe" src="${embedUrl}" allowfullscreen allow="autoplay; fullscreen"></iframe>`;
  } else {
    wrap.innerHTML = `<div class="player-placeholder">
      <span style="font-size:32px">🔗</span>
      <span>Lien vidéo non compatible avec le player intégré</span>
      <a href="${videoUrl}" target="_blank" style="color:var(--red);font-size:13px">Ouvrir dans un nouvel onglet →</a>
    </div>`;
  }
}

// Charger les retours du client
async function chargerRetours() {
  try {
    const data = await api('/databases/' + DB_RETOURS + '/query', 'POST', {
      filter: {property:'Sujet ID', rich_text:{equals: sujetId}},
      sorts: [{timestamp:'created_time', direction:'ascending'}]
    });
    // Filtrer uniquement les retours de ce client
    const mesRetours = data.results.filter(r => {
      const auteur = r.properties.Auteur?.rich_text?.[0]?.plain_text || '';
      return auteur === clientNom;
    });
    afficherRetours(mesRetours);
  } catch(e) { console.warn('Retours:', e); }
}

function afficherRetours(retours) {
  const list = document.getElementById('retours-list');
  const count = document.getElementById('retours-count');
  count.textContent = retours.length;
  if(!retours.length) {
    list.innerHTML = '<div class="empty-retours">Aucun retour pour le moment<br><span style="font-size:11px;color:var(--text3)">Vos retours apparaîtront ici</span></div>';
    return;
  }
  list.innerHTML = retours.map(r => {
    const pr = r.properties;
    const desc = pr.Description?.title?.[0]?.plain_text || '';
    const cat = pr['Catégorie']?.select?.name || '';
    const tc = pr.Timecode?.rich_text?.[0]?.plain_text || '';
    const date = new Date(r.created_time).toLocaleString('fr-FR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    return `<div class="retour-item">
      <div class="retour-item-header">
        ${tc ? `<span class="retour-tc">${tc}</span>` : ''}
        ${cat ? `<span class="retour-cat">${cat}</span>` : ''}
      </div>
      <div class="retour-desc-text">${desc}</div>
      <div class="retour-meta">${date}</div>
    </div>`;
  }).join('');
}

// Formater le timecode
function formatTc(input) {
  let d = input.value.replace(/[^0-9]/g,'');
  if(!d) { input.value=''; return; }
  if(d.length<=2) input.value=`0:${d.padStart(2,'0')}`;
  else if(d.length===3) input.value=`${d[0]}:${d.slice(1)}`;
  else if(d.length===4) input.value=`${parseInt(d.slice(0,2))}:${d.slice(2)}`;
  else input.value=`${d[0]}:${d.slice(1,3)}:${d.slice(3,5)}`;
}

// Soumettre un retour
async function soumettre() {
  const tc = document.getElementById('r-tc').value.trim();
  const cat = document.getElementById('r-cat').value;
  const desc = document.getElementById('r-desc').value.trim();
  if(!desc) { document.getElementById('r-desc').style.borderColor='var(--red)'; return; }
  document.getElementById('r-desc').style.borderColor='';

  try {
    // Créer le retour
    await api('/pages', 'POST', {
      parent: {database_id: DB_RETOURS},
      properties: {
        'Description': {title:[{text:{content:desc}}]},
        'Version': {select:{name: version}},
        'Catégorie': cat ? {select:{name:cat}} : null,
        'Timecode': {rich_text:[{text:{content:tc}}]},
        'Statut': {select:{name:'Ouvert'}},
        'Auteur': {rich_text:[{text:{content:clientNom}}]},
        'Sujet ID': {rich_text:[{text:{content:sujetId}}]},
        'Sujet titre': {rich_text:[{text:{content:sujetData?.titre||''}}]},
        'Source': {select:{name:'Client'}}
      }
    });

    // Remettre le sujet en statut "Retours" + notifier le chef
    await api('/pages/' + sujetId, 'PATCH', {
      properties: {'Statut': {select:{name:'Retours'}}}
    });

    // Notif dans la base notifications (destinataire = chef du sujet)
    // On envoie une notif générique car on n'a pas accès au chef ici
    await api('/pages', 'POST', {
      parent: {database_id: DB_NOTIFS},
      properties: {
        'Message': {title:[{text:{content:`${clientNom} a laissé un retour sur ${sujetData?.code||sujetId}${tc?' · '+tc:''}${cat?' · '+cat:''}`}}]},
        'Type': {select:{name:'retour'}},
        'Destinataire': {rich_text:[{text:{content:'__chef__'}}]},
        'Auteur': {rich_text:[{text:{content:clientNom}}]},
        'Sujet ID': {rich_text:[{text:{content:sujetId}}]},
        'Sujet code': {rich_text:[{text:{content:sujetData?.code||''}}]},
        'Sujet titre': {rich_text:[{text:{content:sujetData?.titre||''}}]},
        'Lu': {checkbox:false}
      }
    });

    document.getElementById('r-desc').value='';
    document.getElementById('r-tc').value='';
    document.getElementById('r-cat').value='';
    toast('Retour envoyé ✓');
    chargerRetours();
  } catch(e) { toast('Erreur : ' + e.message); }
}

// Toast
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Init
getParams();
if(!sujetId || !videoUrl) {
  document.getElementById('id-screen').innerHTML = `<div class="id-card">
    <div class="id-title" style="color:var(--red)">Lien invalide</div>
    <div class="id-sub">Ce lien de visionnage est invalide ou expiré.<br>Contactez l'équipe Réel Média.</div>
  </div>`;
} else {
  // Session déjà existante ?
  const saved = sessionStorage.getItem('review-nom');
  if(saved) {
    clientNom = saved;
    document.getElementById('id-screen').style.display = 'none';
    document.getElementById('app-layout').style.display = 'flex';
    document.getElementById('user-badge').style.display = 'block';
    document.getElementById('user-badge').textContent = `Connecté en tant que ${clientNom}`;
    initPlayer();
    chargerRetours();
  }
}
</script>
</body>
</html>
